  <title id="title">Stanford Torus</title>
  <desc id="desc">Cinematic realistic Stanford torus study plate, rotating ring habitat with illuminated inner rim, hub, spokes and construction cranes over Earth, dark SpaceX-inspired aerospace style, no text, no logos.</desc>
  
